version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ecomarket-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ecomarket
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  opengauss:
    image: enmotech/opengauss:3.0.0
    container_name: ecomarket-opengauss
    environment:
      GS_PASSWORD: Og123@123
      GS_DB: ecomarket
    ports:
      - "5432:5432"
    volumes:
      - opengauss_data:/var/lib/opengauss

  redis:
    image: redis:7.0-alpine
    container_name: ecomarket-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  opengauss_data:
  redis_data:
